; iot_ai ESP32 firmware -- one project, one env per board.
;
; Phase 1 (wired): build + flash over USB from the gateway host.
;   pio run -e sunfounder -t upload
; or via the deploy CLI (recommended, handles versioning):
;   python tools/iotctl/iotctl.py flash --board sunfounder
;
; FW_VERSION defaults below but is overridden by iotctl at flash time so the
; gateway controls the deployed version. Add a board by adding an [env].

[platformio]
default_envs = sunfounder

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; Conservative upload speed -- more reliable when flashing over a usbipd tunnel
; (high baud rates drop mid-write). Bump to 460800 on a native Linux host.
upload_speed = 230400
; WiFi creds come from env vars at build time (WIFI_SSID / WIFI_PASS), loaded
; from .env by iotctl. For a raw `pio run`, export them first:
;   set -a; source ../.env; set +a
build_flags =
    -DFW_VERSION=\"0.1.0\"
    '-DWIFI_SSID="${sysenv.WIFI_SSID}"'
    '-DWIFI_PASS="${sysenv.WIFI_PASS}"'

; --- WROOM-32E on the SunFounder camera extension board (CN0469D) ---
[env:sunfounder]
board = esp32dev
; Camera firmware is large + needs PSRAM for the framebuffer.
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; --- ESP32-S3 (STUB) -- fill in when the unit arrives ---
; S3s usually enumerate as /dev/ttyACM0 rather than /dev/ttyUSB0.
[env:esp32-s3]
board = esp32-s3-devkitc-1

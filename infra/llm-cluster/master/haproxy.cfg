# HAProxy load balancer for the LLM cluster.
#
# TEMPLATE — this file is REGENERATED from fleet.json by `edge deploy` (model-aware
# routing, nodes in fleet/priority order). Set your master + node IPs with
# `edge fleet`, then run `edge deploy`; don't hand-edit. The placeholder `server`
# lines below just let the load balancer start before the first deploy.
#
# Fronts native Ollama on each node so the whole network has ONE always-up,
# load-balanced LLM endpoint:
#   http://<master>:11434   ->  Ollama native API  AND  OpenAI /v1
#   http://<master>:8404    ->  live backend health / stats dashboard

global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    # Generous timeouts: LLM generations stream for a long time.
    timeout connect 5s
    timeout client 300s
    timeout server 300s

frontend llm
    bind *:11434
    default_backend ollama_nodes

backend ollama_nodes
    # `balance first`: prefer the first-listed node, overflow to the next on
    # saturation/failure. (Fleet/priority order; the deployed config is generated.)
    balance first
    # Active health check: poll Ollama's /api/tags every 3s. A node must fail 3
    # checks to be pulled (fall 3) and pass 2 to return (rise 2) -> automatic
    # failover with no client impact.
    option httpchk GET /api/tags
    http-check expect status 200
    default-server check inter 3s fall 3 rise 2 maxconn 64
    # Placeholders — replaced by your fleet.json nodes on `edge deploy`.
    server node1 192.168.1.11:11434
    server node2 192.168.1.12:11434

frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
    stats show-node
